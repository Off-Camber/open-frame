name: outlook-new-email-smoke
steps:
  - id: focus-outlook
    kind: app
    name: "Microsoft Outlook"

  - id: open-compose
    kind: key
    combo:
      - command
      - n

  - id: verify-compose-surface
    kind: verify
    timeout_ms: 2500
    poll_ms: 250
    specs:
      - 'text-appeared:"To"'

  - id: wait-briefly
    kind: wait
    ms: 300
