name: outlook-browser-outlook-handoff
variables:
  browser_app: "Google Chrome"
  browser_url: "https://www.microsoft365.com"
steps:
  - id: focus-outlook
    kind: app
    name: "Microsoft Outlook"

  - id: open-compose
    kind: click
    query: "New Email"
    anchor: center
    click_kind: click

  - id: focus-browser
    kind: app
    name: "{{browser_app}}"

  - id: navigate-browser
    kind: navigate
    url: "{{browser_url}}"

  - id: verify-browser-surface
    kind: verify
    specs:
      - 'text-appeared:"Microsoft 365"'

  - id: return-outlook
    kind: app
    name: "Microsoft Outlook"

  - id: verify-outlook-compose
    kind: verify
    specs:
      - 'text-appeared:"To"'
