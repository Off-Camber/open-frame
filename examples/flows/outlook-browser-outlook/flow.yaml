name: outlook-browser-outlook-handoff
variables:
  browser_url: "https://www.microsoft365.com"
steps:
  - id: focus-outlook
    kind: app
    name: "Microsoft Outlook"

  - id: open-compose
    kind: key
    combo:
      - command
      - n

  - id: verify-compose-surface
    kind: verify
    timeout_ms: 2500
    poll_ms: 250
    specs:
      - 'text-appeared:"To"'

  - id: navigate-browser
    kind: navigate
    url: "{{browser_url}}"

  - id: wait-browser-load
    kind: wait
    ms: 1200

  - id: verify-browser-surface
    kind: verify
    timeout_ms: 4000
    poll_ms: 300
    specs:
      - 'text-appeared:"Microsoft"'

  - id: return-outlook
    kind: app
    name: "Microsoft Outlook"

  - id: verify-outlook-compose
    kind: verify
    timeout_ms: 2500
    poll_ms: 250
    specs:
      - 'text-appeared:"To"'
